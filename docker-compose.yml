services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ai_gateway
      POSTGRES_PASSWORD: ai_gateway
      POSTGRES_DB: ai_gateway
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data:
