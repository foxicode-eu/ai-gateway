name: CD

# Builds and pushes container images to GHCR on every push to main (harmless — just publishes build artifacts
# under this repo's package namespace, no live infra touched) plus manual dispatch. The deploy job additionally
# requires the AZURE_RESOURCE_GROUP repository/environment variable to be set — until it is, the job is skipped
# (not failed), since no Azure environment has actually been provisioned from this codebase yet. See
# deploy/README.md for what needs to be configured before that job can do anything.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write # azure/login uses OIDC federated credentials, not a client secret

env:
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/ai-gateway

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: tag
        run: echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Api
        uses: docker/build-push-action@v6
        with:
          context: src
          file: src/Api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-api:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push Management
        uses: docker/build-push-action@v6
        with:
          context: src
          file: src/Management/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-management:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}-management:latest
          cache-from: type=gha,scope=management
          cache-to: type=gha,mode=max,scope=management

      - name: Build and push Dashboard
        uses: docker/build-push-action@v6
        with:
          context: src/Dashboard
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-dashboard:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}-dashboard:latest
          cache-from: type=gha,scope=dashboard
          cache-to: type=gha,mode=max,scope=dashboard

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ vars.AZURE_RESOURCE_GROUP != '' }}
    environment: production
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Api revision
        run: |
          az containerapp update \
            --name "${{ vars.AZURE_CONTAINERAPP_API }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --image "${{ env.IMAGE_PREFIX }}-api:${{ needs.build-and-push.outputs.tag }}"

      - name: Update Management revision
        run: |
          az containerapp update \
            --name "${{ vars.AZURE_CONTAINERAPP_MANAGEMENT }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --image "${{ env.IMAGE_PREFIX }}-management:${{ needs.build-and-push.outputs.tag }}"

      - name: Update Dashboard revision
        run: |
          az containerapp update \
            --name "${{ vars.AZURE_CONTAINERAPP_DASHBOARD }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --image "${{ env.IMAGE_PREFIX }}-dashboard:${{ needs.build-and-push.outputs.tag }}"
