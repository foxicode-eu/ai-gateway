name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet restore src/Gateway.slnx
      - run: dotnet build src/Gateway.slnx --no-restore
      - run: dotnet test src/Gateway.slnx --no-build

  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: src/Dashboard/package-lock.json
      - run: npm ci
      - run: npm run build
